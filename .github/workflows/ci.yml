name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Provision exact Python contract source
        shell: bash
        run: |
          set -euo pipefail
          commit="$(node -p "require('./UPSTREAM-PARITY.json').git_commit")"
          git clone --no-checkout --no-single-branch https://github.com/Xerolux/idm-heatpump-api.git ../idm-heatpump-api
          git -C ../idm-heatpump-api checkout --detach "$commit"

      - name: Install Python contract runtime
        run: python -m pip install "../idm-heatpump-api[web]"

      - name: Validate package
        run: npm run check

  parity:
    name: Python 3.12 exact parity
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository with full tag history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Verify exact pinned semantic parity
        run: npm run parity:check
